<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch"/>
    </filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
    <clipPath id="clip">
      <rect width="1024" height="1024" rx="228"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Light background -->
    <rect width="1024" height="1024" fill="#eaeaea"/>

    <!-- Organic fluid blobs — soft, overlapping, varied angles -->
    <ellipse cx="240" cy="660" rx="320" ry="210" fill="#3b82f6" opacity="0.5" filter="url(#soft)" transform="rotate(-18, 240, 660)"/>
    <ellipse cx="700" cy="280" rx="280" ry="180" fill="#60a5fa" opacity="0.4" filter="url(#soft)" transform="rotate(12, 700, 280)"/>
    <ellipse cx="480" cy="480" rx="350" ry="150" fill="#2563eb" opacity="0.3" filter="url(#soft)" transform="rotate(-30, 480, 480)"/>
    <circle cx="830" cy="730" r="180" fill="#93c5fd" opacity="0.25" filter="url(#soft)"/>
    <ellipse cx="150" cy="260" rx="190" ry="130" fill="#60a5fa" opacity="0.2" filter="url(#soft)" transform="rotate(25, 150, 260)"/>

    <!-- Heavy grain texture -->
    <rect width="1024" height="1024" filter="url(#grain)" opacity="0.28"/>
  </g>
</svg>
