<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FluidState</title>
  <link rel="icon" type="image/png" href="../../resources/icon.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Geist Sans', ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-weight: 300;
      letter-spacing: -0.015em;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
      background: #1a1a1a;
      color: #f9f9f9;
    }

    html.light body {
      background: #ffffff;
      color: #1b1b1b;
    }

    /* Smooth theme transitions */
    *:not([data-no-transition]) {
      transition-property: color, background-color, border-color, fill, stroke, opacity;
      transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
      transition-duration: 200ms;
    }

    /* Scrollbar — dark */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3d3d3d; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #5e5e5e; }

    /* Scrollbar — light */
    html.light ::-webkit-scrollbar-thumb { background: #d4d4d4; }
    html.light ::-webkit-scrollbar-thumb:hover { background: #b0b0b0; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes phaseGlow {
      0%, 100% { box-shadow: 0 0 4px currentColor; opacity: 1; }
      50% { box-shadow: 0 0 12px currentColor; opacity: 0.8; }
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes modalIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes paletteIn {
      from { opacity: 0; transform: translateY(-8px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./main.tsx"></script>
</body>
</html>
