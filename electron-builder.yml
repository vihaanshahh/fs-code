appId: com.fluidstate.app
productName: FluidState
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - "!node_modules/**/*"
  - node_modules/@anthropic-ai/claude-agent-sdk/**/*
  - node_modules/@img/**/*
  - node_modules/zod/**/*
  - node_modules/node-pty/lib/**/*
  - node_modules/node-pty/build/**/*
  - node_modules/node-pty/package.json
extraResources:
  - from: resources/bin
    to: bin
    filter:
      - "**/*"
asar: true
asarUnpack:
  - node_modules/@anthropic-ai/claude-agent-sdk/**/*
  - node_modules/@img/**/*
mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
  icon: resources/icon.icns
  darkModeSupport: true
  identity: null
win:
  target:
    - nsis
  icon: resources/icon.png
linux:
  target:
    - AppImage
    - deb
  icon: resources/icon.png
  category: Development
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
dmg:
  iconSize: 100
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
