appId: com.fluidstate.app
productName: FluidState
directories:
  buildResources: resources
  output: dist
publish:
  provider: github
  owner: vihaanshahh
  repo: fs-code
files:
  - out/**/*
  - "!node_modules/**/*"
  - node_modules/@anthropic-ai/claude-agent-sdk/**/*
  - node_modules/@img/**/*
  - node_modules/zod/**/*
  - node_modules/node-pty/lib/**/*
  - node_modules/node-pty/build/**/*
  - node_modules/node-pty/package.json
  - node_modules/electron-updater/**/*
  - node_modules/builder-util-runtime/**/*
  - node_modules/lazy-val/**/*
  - node_modules/better-sqlite3/**/*
  - node_modules/tree-sitter/**/*
  - node_modules/tree-sitter-typescript/**/*
  - node_modules/tree-sitter-javascript/**/*
  - node_modules/tree-sitter-python/**/*
  - node_modules/tree-sitter-rust/**/*
  - node_modules/tree-sitter-go/**/*
  - node_modules/tree-sitter-bash/**/*
  - node_modules/tree-sitter-c/**/*
  - node_modules/tree-sitter-cpp/**/*
  - node_modules/tree-sitter-json/**/*
  - node_modules/tree-sitter-css/**/*
  - node_modules/tree-sitter-html/**/*
  - node_modules/bindings/**/*
  - node_modules/file-uri-to-path/**/*
  - node_modules/prebuild-install/**/*
  - node_modules/node-addon-api/**/*
extraResources:
  - from: resources/bin
    to: bin
    filter:
      - "**/*"
asar: true
afterPack: ./scripts/fix-spawn-helper.cjs
asarUnpack:
  - node_modules/node-pty/**/*
  - node_modules/@anthropic-ai/claude-agent-sdk/**/*
  - node_modules/@img/**/*
  - node_modules/better-sqlite3/**/*
  - node_modules/tree-sitter/**/*
  - node_modules/tree-sitter-typescript/**/*
  - node_modules/tree-sitter-javascript/**/*
  - node_modules/tree-sitter-python/**/*
  - node_modules/tree-sitter-rust/**/*
  - node_modules/tree-sitter-go/**/*
  - node_modules/tree-sitter-bash/**/*
  - node_modules/tree-sitter-c/**/*
  - node_modules/tree-sitter-cpp/**/*
  - node_modules/tree-sitter-json/**/*
  - node_modules/tree-sitter-css/**/*
  - node_modules/tree-sitter-html/**/*
mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
  icon: resources/icon.icns
  darkModeSupport: true
  identity: "-"
  hardenedRuntime: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.inherit.plist
win:
  target:
    - nsis
  icon: resources/icon.png
linux:
  target:
    - AppImage
    - deb
  icon: resources/icon.png
  category: Development
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
dmg:
  iconSize: 100
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
